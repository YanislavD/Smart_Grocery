<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="topbar-auth(activePage)">
    <div class="topbar">
        <div class="topbar-links">
            <a class="topbar-link"
               th:classappend="${activePage == 'login'} ? 'active' : ''"
               th:href="@{/login}">Login</a>
            <a class="topbar-link"
               th:classappend="${activePage == 'register'} ? 'active' : ''"
               th:href="@{/register}">Register</a>
        </div>
        <button type="button" class="theme-toggle" onclick="toggleTheme()">Theme</button>
    </div>
</div>

<div th:fragment="topbar-app(activePage)">
    <div class="topbar">
        <div class="topbar-links">
            <a class="topbar-link"
               th:classappend="${activePage == 'dashboard'} ? 'active' : ''"
               th:href="@{/dashboard}">Dashboard</a>
            <a class="topbar-link"
               th:classappend="${activePage == 'pantry'} ? 'active' : ''"
               th:href="@{/pantry}">Pantry</a>
            <a class="topbar-link"
               th:classappend="${activePage == 'shopping-list'} ? 'active' : ''"
               th:href="@{/shopping-list}">Shopping list</a>
        </div>
        <button type="button" class="theme-toggle" onclick="toggleTheme()">Theme</button>
    </div>
</div>

<script th:fragment="theme-script">
    (function () {
        const key = 'sg-theme';
        const root = document.documentElement;
        const darkQuery = window.matchMedia('(prefers-color-scheme: dark)');
        let saved = null;
        try {
            saved = localStorage.getItem(key);
        } catch (e) {
            saved = null;
        }
        const shouldUseDark = saved ? saved === 'dark' : darkQuery.matches;
        if (shouldUseDark) {
            root.setAttribute('data-theme', 'dark');
        } else {
            root.removeAttribute('data-theme');
        }

        function refreshToggleText() {
            const isDark = root.getAttribute('data-theme') === 'dark';
            const label = isDark ? 'Light mode' : 'Dark mode';
            document.querySelectorAll('.theme-toggle').forEach((button) => {
                button.textContent = label;
            });
        }

        window.toggleTheme = function () {
            const isDark = root.getAttribute('data-theme') === 'dark';
            if (isDark) {
                root.removeAttribute('data-theme');
                try {
                    localStorage.setItem(key, 'light');
                } catch (e) {
                    // ignore storage failures
                }
            } else {
                root.setAttribute('data-theme', 'dark');
                try {
                    localStorage.setItem(key, 'dark');
                } catch (e) {
                    // ignore storage failures
                }
            }
            refreshToggleText();
        };

        refreshToggleText();
    })();
</script>
</body>
</html>
