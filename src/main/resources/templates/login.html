<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Smart Grocery</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
<main class="page">
    <section class="card">
        <div class="brand">Smart Grocery</div>
        <h1>Welcome back</h1>
        <p class="subtitle">Sign in to continue managing your Smart Grocery pantry.</p>

        <p th:if="${param.registered}" class="alert alert-success">Registration successful. Please sign in.</p>
        <p th:if="${param.logout}" class="alert alert-success">You have been logged out.</p>
        <p th:if="${param.sessionReset}" class="alert alert-success">Session was reset. Please sign in again.</p>
        <p th:if="${param.error}" class="alert alert-error">Invalid email or password.</p>

        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="field">
                <label for="username">Email</label>
                <input id="username" name="username" type="email" required>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" required>
            </div>

            <button class="btn btn-primary" type="submit">Sign in</button>
        </form>

        <p class="footer-link">New here? <a th:href="@{/register}">Create account</a></p>
    </section>
</main>
</body>
</html>
