version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: smart_pantry_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smart_pantry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - smart_pantry_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smart_pantry"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  smart_pantry_pg_data: